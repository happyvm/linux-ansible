---
- name: Validate hardening overlay matrix contract
  ansible.builtin.assert:
    that:
      - hardening_overlay_matrix is mapping
    fail_msg: "hardening_overlay_matrix must be a mapping (dict)."

- name: Compute overlays set
  ansible.builtin.set_fact:
    resolved_overlays: >-
      {{
        (hardening_overlay_matrix.get(resource_class | default(''), {}).get('baseline', []))
        + (hardening_overlay_matrix.get(resource_class | default(''), {}).get(application_family | default(''), []))
      }}

- name: Apply CIS baseline tasks
  ansible.builtin.include_tasks: cis.yml

- name: Apply ANSSI/internal overlays tasks
  ansible.builtin.include_tasks: overlays.yml
  when:
    - hardening_apply_anssi_overlay | bool or hardening_apply_internal_overlay | bool
