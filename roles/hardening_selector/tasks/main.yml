---
- name: Skip hardening stack when hardening is disabled
  ansible.builtin.debug:
    msg: "Hardening disabled for {{ inventory_hostname }} (hardening_enabled=false)"
  when: not hardening_enabled | bool

- name: Resolve hardening profile by compatibility
  ansible.builtin.set_fact:
    resolved_hardening_profile: >-
      {{
        hardening_profile_mode
        if hardening_profile_mode != 'auto'
        else hardening_profiles.get(os_family_normalized, {}).get(os_major, 'minimal')
      }}
  when: hardening_enabled | bool

- name: Apply hardening engine
  ansible.builtin.include_role:
    name: hardening_engine
  when: hardening_enabled | bool
