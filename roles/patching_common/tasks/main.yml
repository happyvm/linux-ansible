---
- name: Skip patching stack when patching is disabled
  ansible.builtin.debug:
    msg: "Patching disabled for {{ inventory_hostname }} (patching_enabled=false)"
  when: not patching_enabled | bool

- name: Run RPM patching stack
  ansible.builtin.include_role:
    name: patching_rpm
  when:
    - patching_enabled | bool
    - os_family_normalized in ['redhat', 'centos', 'rocky', 'almalinux']

- name: Run Debian patching stack
  ansible.builtin.include_role:
    name: patching_debian
  when:
    - patching_enabled | bool
    - os_family_normalized in ['debian', 'ubuntu']

- name: Reboot manager
  ansible.builtin.include_role:
    name: reboot_manager
  vars:
    reboot_manager_enabled: "{{ patching_enabled | bool }}"
  when: patching_reboot_enabled | bool
