---
# Métadonnées minimales
application_id: null
application_family: null
environment_type: null
site: null
resource_class: null

# Contrôles opérationnels
patching_enabled: true
hardening_enabled: true
hardening_mode: auto
hardening_profile_mode: auto
os_support_tier: auto
allow_obsolete_os: false
allow_vault_repos: false
risk_acknowledged: false

# Déploiement progressif
rollout_serial_by_ring:
  0: 100%
  1: 40%
  2: 25%
  3: 15%
  4: 10%
rollout_max_fail_percentage_by_ring:
  0: 50
  1: 30
  2: 20
  3: 10
  4: 5

# Mapping environment -> ring
environment_ring_map:
  dev: 0
  test: 1
  preprod: 2
  prod_standard: 3
  prod_critical: 4

# Classification support OS
os_support_tiers:
  redhat:
    "10": current
    "9": current
    "8": current
    "7": legacy
    "6": obsolete
  rocky:
    "9": current
    "8": current
  almalinux:
    "9": current
    "8": current
  centos:
    "7": obsolete
    "6": obsolete
  debian:
    "12": current
    "11": current
    "10": legacy
    "9": obsolete
  ubuntu:
    "24": current
    "22": current
    "20": legacy
    "18": obsolete

# Politique de hardening par tier
hardening_mode_policy:
  current: enforce
  legacy: audit
  obsolete: audit

# Overlay ANSSI/interne par type ressource + famille applicative
hardening_overlay_matrix:
  db:
    baseline:
      - disable_unused_services
      - enforce_password_policy
      - tune_kernel_network
    finance:
      - strict_auditd_rules
      - crypto_policy_high
  app:
    baseline:
      - disable_unused_services
      - file_permissions_baseline
  web:
    baseline:
      - tls_baseline
      - file_permissions_baseline
